app = "trialmatch-api"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[checks]]
  name = "health"
  type = "http"
  port = 8000
  method = "get"
  path = "/healthz"
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
